name: Build & Release Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Expo CLI
        run: pnpm add -g expo-cli @expo/cli

      - name: Run Expo Prebuild (Android)
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Generate Release Keystore
        run: |
          keytool -genkeypair -v \
            -keystore seckit-release.jks \
            -alias seckit \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=SecKit,OU=Security,O=SecKit,L=Cairo,ST=Egypt,C=EG" \
            -storepass seckit2024 \
            -keypass seckit2024
          echo "Keystore generated"

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/seckit-release.jks \
            -Pandroid.injected.signing.store.password=seckit2024 \
            -Pandroid.injected.signing.key.alias=seckit \
            -Pandroid.injected.signing.key.password=seckit2024
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: Verify APK Signature
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK: $APK"
          jarsigner -verify -verbose -certs "$APK" | head -20
          echo "APK SIZE: $(du -sh $APK)"

      - name: Rename APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" seckit-v${{ github.run_number }}-signed.apk
          echo "APK_PATH=seckit-v${{ github.run_number }}-signed.apk" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "SecKit v1.0.${{ github.run_number }} — Signed APK"
          body: |
            ## SecKit — Security Toolkit
            
            APK موقع رقمياً ومتحقق منه.
            
            ### الأدوات المتضمنة:
            - Port Scanner & Network Discovery
            - DNS Lookup & WHOIS
            - APK Analyzer
            - Frida Scripts Manager
            - HTTP Request Builder
            - SSL Inspector
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
